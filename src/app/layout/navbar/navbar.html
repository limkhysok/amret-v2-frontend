<!-- ─── Floating Island Navbar ─── -->
<header class="navbar-shell" [class.scrolled]="isScrolled">
    <mat-toolbar class="navbar-bar">

        <!-- Left: Brand -->
        <div class="nav-left">
            <a routerLink="/home" class="navbar-brand">AMRET</a>
        </div>

        <!-- Center: Desktop Nav Links (No Icons) -->
        <nav class="desktop-nav">
            @for (link of navLinks; track link.route) {
            <a [routerLink]="link.route" routerLinkActive="active" mat-button class="nav-btn">
                {{ link.label }}
            </a>
            }
        </nav>

        <!-- Right: Language Switcher & Hamburger -->
        <div class="nav-right">
            <button mat-button class="lang-btn" [matMenuTriggerFor]="langMenu">
                <mat-icon fontSet="material-symbols-outlined">translate</mat-icon>
                {{ currentLang }}
                <mat-icon>arrow_drop_down</mat-icon>
            </button>
            <mat-menu #langMenu="matMenu" class="amret-custom-menu">
                <button mat-menu-item (click)="setLanguage('EN')">English</button>
                <button mat-menu-item (click)="setLanguage('KH')">ភាសាខ្មែរ</button>
            </mat-menu>

            <button mat-icon-button class="mobile-toggle" (click)="toggleMobileMenu()"
                [attr.aria-label]="isMobileMenuOpen ? 'Close menu' : 'Open menu'">
                <mat-icon>{{ isMobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
            </button>
        </div>

    </mat-toolbar>
</header>

<!-- Mobile Drawer -->
@if (isMobileMenuOpen) {
<div class="mobile-drawer">
    @for (link of navLinks; track link.route) {
    <a [routerLink]="link.route" routerLinkActive="active" mat-button class="drawer-link"
        (click)="isMobileMenuOpen = false">
        {{ link.label }}
    </a>
    }
    <mat-divider></mat-divider>
    <button mat-button class="drawer-lang" (click)="setLanguage('EN')">English</button>
    <button mat-button class="drawer-lang" (click)="setLanguage('KH')">ភាសាខ្មែរ</button>
</div>
}
