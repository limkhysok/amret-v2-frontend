<!-- Top Navbar Header -->
<header class="navbar">

    <!-- Branding -->
    <div class="navbar-brand">
        <span class="logo">AMRET</span>
    </div>

    <!-- Main Desktop Menu -->
    <nav class="desktop-menu" [class.open]="isMobileMenuOpen">
        <a routerLink="/home" class="nav-link" (click)="isMobileMenuOpen = false">
            <span class="material-symbols-outlined nav-icon">home</span>
            HOME
        </a>
        <a routerLink="/about" class="nav-link" (click)="isMobileMenuOpen = false">
            <span class="material-symbols-outlined nav-icon">info</span>
            ABOUT US
        </a>
        <a routerLink="/products" class="nav-link" (click)="isMobileMenuOpen = false">
            <span class="material-symbols-outlined nav-icon">inventory_2</span>
            PRODUCTS & SERVICES
        </a>
        <!-- Merged PROTECTION section -->
        <a routerLink="/protection" class="nav-link" (click)="isMobileMenuOpen = false">
            <span class="material-symbols-outlined nav-icon">security</span>
            PROTECTION
        </a>
        <a routerLink="/media" class="nav-link" (click)="isMobileMenuOpen = false">
            <span class="material-symbols-outlined nav-icon">perm_media</span>
            MEDIA
        </a>
        <a routerLink="/careers" class="nav-link" (click)="isMobileMenuOpen = false">
            <span class="material-symbols-outlined nav-icon">work</span>
            CAREERS
        </a>

        <!-- Tools for Mobile Drawer Menu -->
        <div class="drawer-tools">
            <!-- Custom Language Switcher (Mobile) -->
            <div class="language-selector" (click)="toggleLangDropdown($event)">
                <span class="material-symbols-outlined lang-icon">translate</span>
                <span class="selected-lang">{{currentLang}}</span>
                <span class="material-symbols-outlined dropdown-arrow">expand_more</span>

                <div class="custom-dropdown" *ngIf="isLangDropdownOpen">
                    <div class="dropdown-item" (click)="setLanguage('ENGLISH')">ENGLISH</div>
                    <div class="dropdown-item" (click)="setLanguage('KHMER')">KHMER</div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Right-Side Action Tools -->
    <div class="navbar-tools">

        <!-- Custom Language Selector (Desktop) -->
        <div class="language-selector top-desktop-tools" (click)="toggleLangDropdown($event)">
            <span class="material-symbols-outlined lang-icon">translate</span>
            <span class="selected-lang">{{currentLang}}</span>
            <span class="material-symbols-outlined dropdown-arrow">expand_more</span>

            <div class="custom-dropdown" *ngIf="isLangDropdownOpen">
                <div class="dropdown-item" (click)="setLanguage('ENGLISH')">ENGLISH</div>
                <div class="dropdown-item" (click)="setLanguage('KHMER')">KHMER</div>
            </div>
        </div>

        <!-- Mobile Menu Icon -->
        <button class="mobile-toggle" (click)="toggleMobileMenu()">
            <span class="material-symbols-outlined">{{ isMobileMenuOpen ? 'close' : 'menu' }}</span>
        </button>

    </div>
</header>
